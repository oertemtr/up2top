<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trade the BIST — Signals</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lightweight-charts@4.1.1/dist/lightweight-charts.standalone.production.js"></script>
<style>
:root {
  --bg-primary: #0a0e17;
  --bg-secondary: #111827;
  --bg-card: #1a2233;
  --bg-card-hover: #1e2940;
  --text-primary: #e5e7eb;
  --text-secondary: #9ca3af;
  --text-muted: #6b7280;
  --accent-green: #10b981;
  --accent-red: #ef4444;
  --accent-blue: #3b82f6;
  --accent-yellow: #f59e0b;
  --low-risk: #10b981;
  --med-risk: #3b82f6;
  --high-risk: #ef4444;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Inter',sans-serif; background:var(--bg-primary); color:var(--text-primary); min-height:100vh; }
.container { max-width:1400px; margin:0 auto; padding:0 20px; }

/* Header */
.header { padding:16px 0; border-bottom:1px solid #1f2937; display:flex; align-items:center; justify-content:space-between; }
.logo { font-size:24px; font-weight:800; text-decoration:none; color:var(--text-primary); letter-spacing:-1px; }
.logo span { color:var(--accent-blue); }
.header-center { display:flex; align-items:center; gap:12px; }
.header-title { font-size:18px; font-weight:600; }
.risk-badge { padding:5px 14px; border-radius:20px; font-size:13px; font-weight:700; text-transform:uppercase; letter-spacing:0.5px; }
.risk-badge.low_risk { background:rgba(16,185,129,0.15); color:var(--low-risk); border:2px solid var(--low-risk); }
.risk-badge.medium_risk { background:rgba(59,130,246,0.15); color:var(--med-risk); border:2px solid var(--med-risk); }
.risk-badge.high_risk { background:rgba(239,68,68,0.15); color:var(--high-risk); border:2px solid var(--high-risk); }
.header-meta { font-size:12px; color:var(--text-muted); }

/* Tabs */
.tabs { display:flex; gap:4px; margin:24px 0 20px; background:var(--bg-card); border-radius:10px; padding:4px; width:fit-content; }
.tab-btn { padding:8px 20px; border-radius:8px; border:none; background:transparent; color:var(--text-secondary); font-size:14px; font-weight:500; cursor:pointer; transition:all 0.2s; font-family:'Inter',sans-serif; }
.tab-btn.active { background:var(--accent-blue); color:white; }
.tab-btn:hover:not(.active) { color:var(--text-primary); }

/* Signal cards — HORIZONTAL on desktop */
.signal-card {
  background:var(--bg-card); border:1px solid #1f2937; border-radius:10px; padding:16px 20px;
  cursor:pointer; transition:all 0.3s; margin-bottom:10px;
  display:grid; grid-template-columns:100px 70px 1fr 1fr 100px 90px; align-items:center; gap:16px;
}
.signal-card:hover { background:var(--bg-card-hover); border-color:rgba(255,255,255,0.15); }
.signal-card.latest-active { animation:pulse-glow 2s ease-in-out infinite; }
.signal-card.latest-active.long-glow { animation:pulse-long 2s ease-in-out infinite; }
.signal-card.latest-active.short-glow { animation:pulse-short 2s ease-in-out infinite; }

@keyframes pulse-long {
  0%,100% { box-shadow:0 0 0 0 rgba(16,185,129,0.4); border-color:rgba(16,185,129,0.3); }
  50% { box-shadow:0 0 20px 8px rgba(16,185,129,0.15); border-color:rgba(16,185,129,0.6); }
}
@keyframes pulse-short {
  0%,100% { box-shadow:0 0 0 0 rgba(239,68,68,0.4); border-color:rgba(239,68,68,0.3); }
  50% { box-shadow:0 0 20px 8px rgba(239,68,68,0.15); border-color:rgba(239,68,68,0.6); }
}

.sc-symbol { font-size:16px; font-weight:700; }
.sc-dir { display:inline-block; padding:4px 10px; border-radius:4px; font-size:12px; font-weight:700; text-transform:uppercase; }
.sc-dir.long { background:rgba(16,185,129,0.15); color:var(--accent-green); }
.sc-dir.short { background:rgba(239,68,68,0.15); color:var(--accent-red); }
.sc-info { font-size:13px; color:var(--text-secondary); line-height:1.5; }
.sc-info strong { color:var(--text-primary); }
.sc-pnl { font-size:16px; font-weight:700; text-align:right; }
.sc-pnl.pos { color:var(--accent-green); }
.sc-pnl.neg { color:var(--accent-red); }
.sc-status { text-align:right; }
.status-pill { display:inline-block; padding:4px 10px; border-radius:4px; font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:0.5px; }
.status-pill.active { background:rgba(59,130,246,0.15); color:var(--accent-blue); animation:blink 1.5s ease-in-out infinite; }
.status-pill.closed { background:rgba(107,114,128,0.15); color:var(--text-muted); }
@keyframes blink { 0%,100%{opacity:1;} 50%{opacity:0.4;} }

/* Expanded panel — horizontal: chart left, details right */
.expanded-panel { margin-top:16px; display:grid; grid-template-columns:1fr 340px; gap:16px; grid-column:1 / -1; }
.chart-box { background:var(--bg-secondary); border:1px solid #1f2937; border-radius:8px; padding:16px; min-height:420px; }
.chart-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; font-size:13px; }
.chart-header span:first-child { font-weight:600; }
.chart-header span:last-child { color:var(--text-muted); font-size:11px; }
.chart-wrap { width:100%; height:380px; }
.chart-loading { display:flex; align-items:center; justify-content:center; height:100%; color:var(--text-muted); font-size:13px; }

.details-box { background:var(--bg-secondary); border:1px solid #1f2937; border-radius:8px; padding:16px; display:flex; flex-direction:column; gap:12px; }
.details-title { font-size:15px; font-weight:600; margin-bottom:4px; }
.news-btn { display:block; width:100%; padding:10px; border-radius:6px; border:none; font-size:13px; font-weight:600; cursor:pointer; text-decoration:none; text-align:center; color:white; transition:all 0.2s; font-family:'Inter',sans-serif; }
.news-btn:hover { opacity:0.85; transform:translateY(-1px); }
.trade-detail-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; font-size:13px; }
.td-item { padding:8px; background:var(--bg-card); border-radius:6px; }
.td-label { font-size:10px; text-transform:uppercase; color:var(--text-muted); letter-spacing:0.5px; margin-bottom:2px; }
.td-val { font-weight:600; color:var(--text-primary); }
.td-val.green { color:var(--accent-green); }
.td-val.red { color:var(--accent-red); }
.td-val.yellow { color:var(--accent-yellow); }

/* Empty state */
.empty-state { text-align:center; padding:48px; background:var(--bg-card); border-radius:10px; }
.empty-state h3 { margin-bottom:8px; }
.empty-state p { color:var(--text-muted); }

/* Footer */
.footer { padding:24px 0; margin-top:40px; border-top:1px solid #1f2937; text-align:center; }
.footer a { color:var(--accent-blue); text-decoration:none; font-size:14px; }

/* Responsive */
@media (max-width:1024px) {
  .expanded-panel { grid-template-columns:1fr; }
}
@media (max-width:768px) {
  .signal-card { grid-template-columns:1fr 1fr; gap:10px; padding:12px; }
  .header { flex-direction:column; gap:10px; }
}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <a href="index.html" class="logo">Up2<span>Top</span></a>
    <div class="header-center">
      <span class="header-title" id="hTitle"></span>
      <span class="risk-badge" id="hBadge"></span>
    </div>
    <div class="header-meta">Updated: <span id="hUpdated">—</span></div>
  </div>

  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('active')">Active Signals <span id="activeCount"></span></button>
    <button class="tab-btn" onclick="switchTab('past')">Past Trades <span id="pastCount"></span></button>
  </div>

  <div id="tab-active" class="tab-panel"></div>
  <div id="tab-past" class="tab-panel" style="display:none"></div>

  <footer class="footer"><a href="index.html">&larr; Back to strategies</a></footer>
</div>

<script>
// KAP RSS / search URLs (bildirim-sorgu with company filter)
const KAP_SEARCH = {
  'AEFES.IS':'ANADOLU+EFES','AKBNK.IS':'AKBANK','ASELS.IS':'ASELSAN',
  'BIMAS.IS':'BIM+BIRLESIK','EKGYO.IS':'EMLAK+KONUT','ENKAI.IS':'ENKA+INSAAT',
  'EREGL.IS':'EREGLI+DEMIR','FROTO.IS':'FORD+OTOSAN','GARAN.IS':'GARANTI+BANKASI',
  'GUBRF.IS':'GUBRE+FABRIKALARI','ISCTR.IS':'IS+BANKASI','KCHOL.IS':'KOC+HOLDING',
  'KRDMD.IS':'KARDEMIR','MGROS.IS':'MIGROS','PETKM.IS':'PETKIM',
  'PGSUS.IS':'PEGASUS','SAHOL.IS':'SABANCI+HOLDING','SASA.IS':'SASA+POLYESTER',
  'SISE.IS':'TURKIYE+SISE','TAVHL.IS':'TAV+HAVALIMANLARI','TCELL.IS':'TURKCELL',
  'THYAO.IS':'TURK+HAVA+YOLLARI','TOASO.IS':'TOFAS','TTKOM.IS':'TURK+TELEKOM',
  'TUPRS.IS':'TUPRAS','ULKER.IS':'ULKER','YKBNK.IS':'YAPI+KREDI',
};

let DATA = null, STRAT_KEY = null, expandedEl = null;

async function init() {
  STRAT_KEY = new URLSearchParams(location.search).get('strategy') || 'low_risk';
  const res = await fetch('data/strategies.json?t=' + Date.now());
  DATA = await res.json();
  const s = DATA.strategies[STRAT_KEY];
  if (!s) { document.body.innerHTML = '<h2 style="padding:40px">Strategy not found</h2>'; return; }

  const labels = {low_risk:'LOW RISK',medium_risk:'MEDIUM RISK',high_risk:'HIGH RISK'};
  document.getElementById('hTitle').textContent = s.subtitle || s.name;
  const badge = document.getElementById('hBadge');
  badge.textContent = labels[STRAT_KEY]; badge.className = 'risk-badge ' + STRAT_KEY;
  document.getElementById('hUpdated').textContent = DATA.last_updated || '—';
  document.title = `${s.name} — Trade the BIST`;

  const active = s.trades.filter(t => t.status === 'active').sort((a,b) => b.entry_date.localeCompare(a.entry_date));
  const past = s.trades.filter(t => t.status !== 'active').sort((a,b) => b.entry_date.localeCompare(a.entry_date));

  document.getElementById('activeCount').textContent = active.length ? `(${active.length})` : '';
  document.getElementById('pastCount').textContent = past.length ? `(${past.length})` : '';

  renderList('tab-active', active, true);
  renderList('tab-past', past, false);

  if (active.length === 0) switchTab('past');
}

function renderList(containerId, trades, isActiveTab) {
  const el = document.getElementById(containerId);
  if (!trades.length) {
    el.innerHTML = `<div class="empty-state"><h3>${isActiveTab ? 'No Active Signals' : 'No Past Trades'}</h3><p>${isActiveTab ? 'The model is not seeing opportunities right now. Check back soon.' : 'No completed trades yet.'}</p></div>`;
    return;
  }
  el.innerHTML = trades.map((t, i) => {
    const dir = t.direction.toUpperCase();
    const pnl = t.pnl !== undefined ? t.pnl : 0;
    const isPos = pnl >= 0;
    const isLatest = i === 0 && isActiveTab;
    const glowClass = isLatest ? `latest-active ${dir === 'LONG' ? 'long-glow' : 'short-glow'}` : '';
    const exitLabel = t.status === 'active' ? `Exp: ${t.exit_date}` : t.exit_date;
    const stoppedTag = t.stopped ? ' <span style="color:var(--accent-red);font-size:10px;">STOPPED</span>' : '';
    return `<div class="signal-card ${glowClass}" data-idx="${i}" data-tab="${isActiveTab ? 'active' : 'past'}" onclick="toggleExpand(this)">
      <div class="sc-symbol">${t.symbol.replace('.IS','')}</div>
      <div><span class="sc-dir ${dir.toLowerCase()}">${dir}</span></div>
      <div class="sc-info"><strong>${t.entry_date}</strong> @ ₺${t.entry_price.toFixed(2)}</div>
      <div class="sc-info"><strong>${exitLabel}</strong> @ ₺${t.exit_price.toFixed(2)}</div>
      <div class="sc-pnl ${isPos ? 'pos' : 'neg'}">${isPos ? '+' : ''}${pnl.toFixed(2)}%${stoppedTag}</div>
      <div class="sc-status"><span class="status-pill ${t.status}">${t.status.toUpperCase()}</span></div>
    </div>`;
  }).join('');
}

function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('active', (tab==='active' ? i===0 : i===1)));
  document.getElementById('tab-active').style.display = tab === 'active' ? 'block' : 'none';
  document.getElementById('tab-past').style.display = tab === 'past' ? 'block' : 'none';
}

function toggleExpand(card) {
  const existing = card.querySelector('.expanded-panel');
  if (existing) { existing.remove(); if (expandedEl === card) { expandedEl = null; return; } }
  if (expandedEl) { const old = expandedEl.querySelector('.expanded-panel'); if (old) old.remove(); }
  expandedEl = card;

  const idx = parseInt(card.dataset.idx);
  const isActive = card.dataset.tab === 'active';
  const s = DATA.strategies[STRAT_KEY];
  const list = s.trades.filter(t => isActive ? t.status === 'active' : t.status !== 'active')
    .sort((a,b) => b.entry_date.localeCompare(a.entry_date));
  const trade = list[idx];
  if (!trade) return;

  const sym = trade.symbol;
  const symShort = sym.replace('.IS','');
  const chartId = 'chart_' + Date.now();
  const kapSearch = KAP_SEARCH[sym] || symShort;
  const kapUrl = `https://www.kap.org.tr/tr/bildirim-sorgu?aramaTuru=hepsi&bapiIslem=true&firmaYada=${encodeURIComponent(kapSearch)}`;

  const panel = document.createElement('div');
  panel.className = 'expanded-panel';
  panel.onclick = e => e.stopPropagation();
  panel.innerHTML = `
    <div class="chart-box">
      <div class="chart-header">
        <span>${symShort} — ${trade.direction}</span>
        <span>${isTradeHours() ? '🟢 Live' : '📊 Historical'}</span>
      </div>
      <div class="chart-wrap" id="${chartId}"><div class="chart-loading">Loading chart...</div></div>
    </div>
    <div class="details-box">
      <div class="details-title">${symShort} News & Disclosures</div>
      <a href="${kapUrl}" target="_blank" class="news-btn" style="background:var(--accent-blue);">📋 KAP Disclosures</a>
      <a href="https://www.google.com/search?q=${symShort}+hisse+haberleri&tbm=nws" target="_blank" class="news-btn" style="background:var(--accent-green);">📰 Google News</a>
      <a href="https://www.investing.com/search/?q=${symShort}" target="_blank" class="news-btn" style="background:var(--bg-card);border:1px solid var(--accent-blue);">📈 Investing.com</a>
      <div style="margin-top:4px;">
        <div class="details-title" style="font-size:13px;">Trade Details</div>
        <div class="trade-detail-grid">
          <div class="td-item"><div class="td-label">Direction</div><div class="td-val ${trade.direction==='LONG'?'green':'red'}">${trade.direction}</div></div>
          <div class="td-item"><div class="td-label">Hold Period</div><div class="td-val">${trade.expected_hold_days}d</div></div>
          <div class="td-item"><div class="td-label">Entry</div><div class="td-val">${trade.entry_date}<br>₺${trade.entry_price.toFixed(2)}</div></div>
          <div class="td-item"><div class="td-label">${trade.status==='active'?'Expected Exit':'Exit'}</div><div class="td-val">${trade.exit_date}<br>₺${trade.exit_price.toFixed(2)}</div></div>
          <div class="td-item"><div class="td-label">Stop Loss</div><div class="td-val red">₺${trade.stop_price.toFixed(2)} (-3%)</div></div>
          <div class="td-item"><div class="td-label">P&L</div><div class="td-val ${trade.pnl>=0?'green':'red'}">${trade.pnl>=0?'+':''}${trade.pnl.toFixed(2)}%</div></div>
          ${trade.stopped ? '<div class="td-item" style="grid-column:span 2;"><div class="td-val red">⛔ Stop-loss triggered</div></div>' : ''}
          ${trade.overridden ? '<div class="td-item" style="grid-column:span 2;"><div class="td-val yellow">⚡ Overridden by opposite signal</div></div>' : ''}
        </div>
      </div>
    </div>`;
  card.appendChild(panel);
  loadChart(chartId, trade, sym);
}

function isTradeHours() {
  try {
    const now = new Date();
    const turkeyTime = new Date(now.toLocaleString('en-US',{timeZone:'Europe/Istanbul'}));
    return turkeyTime.getHours()>=10 && turkeyTime.getHours()<18 && turkeyTime.getDay()>=1 && turkeyTime.getDay()<=5;
  } catch(e) { return false; }
}

async function loadChart(chartId, trade, sym) {
  const el = document.getElementById(chartId);
  if (!el) return;
  let ohlcv = [];

  // Try embedded OHLCV
  const s = DATA.strategies[STRAT_KEY];
  if (s.ohlcv && s.ohlcv[sym]) {
    ohlcv = s.ohlcv[sym];
  }

  // Try Yahoo Finance if trading hours or no data
  if (ohlcv.length === 0 || isTradeHours()) {
    try {
      const yData = await fetchYahoo(sym);
      if (yData.length > 0) ohlcv = yData;
    } catch(e) {}
  }

  if (!ohlcv || ohlcv.length === 0) {
    el.innerHTML = '<div class="chart-loading">No chart data available</div>';
    return;
  }

  // For past trades: show 30 days before exit date through exit date
  // For active trades: show 30 days before entry through latest
  let refDate = trade.status === 'active' ? trade.entry_date : trade.exit_date;
  let startDate = new Date(refDate);
  startDate.setDate(startDate.getDate() - 45); // 45 calendar days ~ 30 trading days
  const startStr = startDate.toISOString().slice(0,10);

  let filtered;
  if (trade.status === 'active') {
    filtered = ohlcv.filter(d => d.date >= startStr);
  } else {
    filtered = ohlcv.filter(d => d.date >= startStr && d.date <= trade.exit_date);
  }
  // Ensure entry date candle is included
  if (filtered.length > 0 && filtered[0].date > trade.entry_date) {
    const entryBars = ohlcv.filter(d => d.date >= trade.entry_date);
    filtered = entryBars;
  }
  if (filtered.length === 0) filtered = ohlcv.slice(-30);

  filtered.sort((a,b) => a.date.localeCompare(b.date));

  el.innerHTML = '';
  const chart = LightweightCharts.createChart(el, {
    layout: { background:{color:'transparent'}, textColor:'#9ca3af' },
    grid: { vertLines:{color:'rgba(255,255,255,0.03)'}, hLines:{color:'rgba(255,255,255,0.03)'} },
    timeScale: { borderColor:'#1f2937' },
    rightPriceScale: { borderColor:'#1f2937' },
    crosshair: { mode: 0 },
  });

  const candles = chart.addCandlestickSeries({
    upColor:'#10b981', downColor:'#ef4444',
    borderUpColor:'#10b981', borderDownColor:'#ef4444',
    wickUpColor:'#10b981', wickDownColor:'#ef4444',
  });
  candles.setData(filtered.map(d => ({time:d.date, open:d.open, high:d.high, low:d.low, close:d.close})));

  const vol = chart.addHistogramSeries({
    color:'rgba(59,130,246,0.2)', priceFormat:{type:'volume'}, priceScaleId:'vol',
  });
  chart.priceScale('vol').applyOptions({scaleMargins:{top:0.85,bottom:0}});
  vol.setData(filtered.map(d => ({
    time:d.date, value:d.volume,
    color: d.close >= d.open ? 'rgba(16,185,129,0.25)' : 'rgba(239,68,68,0.25)'
  })));

  // Signal markers
  const isLong = trade.direction === 'LONG';
  const markers = [];
  if (filtered.some(d => d.date === trade.entry_date)) {
    markers.push({
      time:trade.entry_date,
      position: isLong ? 'belowBar' : 'aboveBar',
      color: isLong ? '#10b981' : '#ef4444',
      shape: isLong ? 'arrowUp' : 'arrowDown',
      text: `${isLong?'BUY':'SELL'} ₺${trade.entry_price.toFixed(0)}`
    });
  }
  if (trade.status === 'closed' && filtered.some(d => d.date === trade.exit_date)) {
    markers.push({
      time:trade.exit_date,
      position: isLong ? 'aboveBar' : 'belowBar',
      color:'#f59e0b',
      shape: isLong ? 'arrowDown' : 'arrowUp',
      text: `CLOSE ₺${trade.exit_price.toFixed(0)}`
    });
  }
  markers.sort((a,b) => a.time.localeCompare(b.time));
  if (markers.length) candles.setMarkers(markers);

  // Stop-loss line
  candles.createPriceLine({price:trade.stop_price, color:'#ef4444', lineWidth:1, lineStyle:2, axisLabelVisible:true, title:'SL'});

  chart.timeScale().fitContent();
  new ResizeObserver(() => { if (el.offsetParent) chart.applyOptions({width:el.clientWidth}); }).observe(el);
}

async function fetchYahoo(symbol) {
  try {
    const r = await fetch(`https://query1.finance.yahoo.com/v8/finance/chart/${symbol}?interval=1d&range=3mo`);
    if (!r.ok) return [];
    const d = await r.json();
    if (!d.chart?.result?.[0]) return [];
    const res = d.chart.result[0], ts = res.timestamp||[], q = res.indicators.quote[0];
    return ts.map((t,i) => ({
      date:new Date(t*1000).toISOString().slice(0,10),
      open:q.open[i], high:q.high[i], low:q.low[i], close:q.close[i], volume:q.volume[i]
    })).filter(x => x.open != null);
  } catch(e) { return []; }
}

init();
</script>
</body>
</html>
